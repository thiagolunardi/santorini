name: Build Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  versioning:
    runs-on: ubuntu-latest
    name: Versioning
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: codacy/git-version@2.8.6
        id: version
        with:
          release-branch: main
          prefix: v

      - name: Tag do repositorio
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::notice:: ${{ steps.version.outputs.version }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push --tags
        if: github.ref == 'refs/heads/main'

      - name: Create file version
        run: |
          echo ${{ steps.version.outputs.version }} > versao.txt
        if: github.ref == 'refs/heads/main'

      - uses: actions/upload-artifact@v7
        with:
          name: versao
          path: versao.txt
        if: github.ref == 'refs/heads/main'

  backend-build-and-test:
    needs: versioning
    runs-on: ubuntu-latest
    name: Backend Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Restore
        run: |
          dotnet restore Santorini.slnx

      - name: Build
        run: |
          dotnet build --no-restore --configuration Release Santorini.slnx

      - name: Unit Tests
        run: |
          dotnet test tests/Santorini.UnitTests/Santorini.UnitTests.csproj \
            --no-build --no-restore --configuration Release \
            --logger "junit;LogFilePath=${{ github.workspace }}/TestResults/unit-test-results.xml" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=json \
            /p:Exclude="[xunit.*]*" \
            /p:CoverletOutput="${{ github.workspace }}/TestResults/coverage.json"

      - name: Integration Tests
        run: |
          dotnet test tests/Santorini.IntegrationTests/Santorini.IntegrationTests.csproj \
            --no-build --no-restore --configuration Release \
            --logger "junit;LogFilePath=${{ github.workspace }}/TestResults/integration-test-results.xml" \
            /p:CollectCoverage=true \
            /p:MergeWith="${{ github.workspace }}/TestResults/coverage.json" \
            /p:CoverletOutputFormat=opencover \
            /p:Exclude="[xunit.*]*" \
            /p:CoverletOutput="${{ github.workspace }}/TestResults/coverage"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ github.workspace }}/TestResults/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        with:
          files: ${{ github.workspace }}/TestResults/unit-test-results.xml,${{ github.workspace }}/TestResults/integration-test-results.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results
          path: ${{ github.workspace }}/TestResults

  frontend-build-and-test:
    needs: versioning
    runs-on: ubuntu-latest
    name: Frontend Build and Test
    defaults:
      run:
        working-directory: ./src/Santorini.UI

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ./src/Santorini.UI/package-lock.json

      - name: Install dependencies
        run: |
          npm ci

      - name: Build
        run: |
          npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: web
          path: ./src/Santorini.UI/dist

  dependency-check:
    name: Dependency Check
    needs: versioning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          base-ref: refs/heads/main
          head-ref: refs/heads/main

  code-security-check:
    name: Code Security Check
    needs: versioning
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      matrix:
        include:
          - name: Backend
            language: csharp
            build-mode: autobuild

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        name: Initialize CodeQL - ${{ matrix.name }}
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - uses: github/codeql-action/analyze@v4
        name: Analyze code - ${{ matrix.name }}
        with:
          category: "/language:${{ matrix.language }}"
