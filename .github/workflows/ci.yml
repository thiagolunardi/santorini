name: CI

# Disabled: superseded by build.yml
# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore --no-cache

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/Santorini.UnitTests/Santorini.UnitTests.csproj --no-build --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Exclude="[xunit.*]*" /p:CoverletOutput="./TestResults/"

      - name: Integration Tests
        run: dotnet test tests/Santorini.IntegrationTests/Santorini.IntegrationTests.csproj --no-build --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Exclude="[xunit.*]*" /p:CoverletOutput="./TestResults/"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./tests/Santorini.UnitTests/TestResults/coverage.opencover.xml,./tests/Santorini.IntegrationTests/TestResults/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
